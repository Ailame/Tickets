<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incident Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #0f1117;
  --bg2: #181c27;
  --bg3: #1e2333;
  --border: #2a3045;
  --text: #e2e8f0;
  --text2: #8892a4;
  --text3: #4a5568;
  --accent: #e24b4a;
  --accent2: #ff6b6a;
  --mono: 'IBM Plex Mono', monospace;
  --radius: 6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh}
.shell{max-width:1100px;margin:0 auto;padding:1.5rem 1.25rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.logo-text{font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text2);letter-spacing:.06em;text-transform:uppercase}
.user-pill{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--text2)}
.user-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem}
.stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem}
.stat-val{font-size:26px;font-weight:600;color:var(--text)}
.stat-val.red{color:#ef4444}
.stat-val.amber{color:#f59e0b}
.stat-val.green{color:#4ade80}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.search-wrap{position:relative;flex:1}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px}
input[type=text]{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:7px 10px 7px 32px;font-size:12px;font-family:var(--mono);outline:none;transition:border .15s}
input[type=text]:focus{border-color:var(--accent)}
select{background:var(--bg2);border:1px solid var(--border);color:var(--text2);border-radius:var(--radius);padding:7px 10px;font-size:11px;font-family:var(--mono);outline:none;cursor:pointer;height:34px}
select:focus{border-color:var(--accent)}
.btn-new{height:34px;padding:0 16px;font-size:11px;font-family:var(--mono);font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background .15s}
.btn-new:hover{background:var(--accent2)}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg3);color:var(--text2);font-weight:500;text-align:left;padding:9px 14px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.08em}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable:hover td{background:var(--bg3);cursor:pointer}
.id-cell{color:var(--text3);font-size:11px;font-weight:500;letter-spacing:.04em}
.name-cell{color:var(--text);font-weight:500}
.ts-cell{color:var(--text2);font-size:11px}
.author-cell{color:var(--text2);font-size:11px}
.empty-row td{text-align:center;padding:3rem;color:var(--text3);font-size:12px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.p1{background:#3f1010;color:#f87171;border:1px solid #7f1d1d}
.p2{background:#3d2000;color:#fbbf24;border:1px solid #78350f}
.p3{background:#0f2d1a;color:#4ade80;border:1px solid #14532d}
.p4{background:#0d1f3a;color:#60a5fa;border:1px solid #1e3a5f}
.type-badge{display:inline-flex;align-items:center;background:var(--bg3);color:var(--text2);border:1px solid var(--border);padding:2px 8px;border-radius:3px;font-size:10px;letter-spacing:.04em}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);align-items:center;justify-content:center;z-index:100;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1.75rem;width:100%;max-width:520px;animation:modal-in .18s ease}
@keyframes modal-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.modal-title{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text);margin-bottom:1.5rem;display:flex;align-items:center;gap:8px}
.modal-title i{color:var(--accent)}
.form-row{margin-bottom:1rem}
.form-row label{display:block;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:8px 10px;font-size:12px;font-family:var(--mono);outline:none;transition:border .15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-row textarea{height:100px;resize:vertical}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;margin-top:1.5rem;justify-content:flex-end}
.btn-cancel{padding:7px 16px;font-size:11px;font-family:var(--mono);background:transparent;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text2);transition:border .15s}
.btn-cancel:hover{border-color:var(--text2)}
.btn-submit{padding:7px 16px;font-size:11px;font-family:var(--mono);font-weight:600;letter-spacing:.04em;text-transform:uppercase;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;transition:background .15s}
.btn-submit:hover{background:var(--accent2)}
.btn-del{padding:7px 16px;font-size:11px;font-family:var(--mono);background:transparent;border:1px solid #7f1d1d;color:#f87171;border-radius:var(--radius);cursor:pointer;margin-right:auto}
.btn-del:hover{background:#3f1010}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.detail-field .dl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.detail-field .dv{font-size:12px;color:var(--text);line-height:1.6}
.detail-text{font-size:12px;color:var(--text);line-height:1.7;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;white-space:pre-wrap;max-height:200px;overflow-y:auto}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;font-size:12px;color:var(--text);display:flex;align-items:center;gap:8px;z-index:200;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:none}
.toast.error{border-color:#7f1d1d;color:#f87171}
.toast i{color:#4ade80}
.toast.error i{color:#f87171}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-alert-triangle"></i></div>
      <div>
        <div class="logo-text">Incident Tracker</div>
        <div class="logo-sub">shared · jsonbin</div>
      </div>
    </div>
    <div class="user-pill"><div class="user-dot"></div><span id="user-badge">—</span></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">P1 Critical</div><div class="stat-val red" id="s-p1">—</div></div>
    <div class="stat"><div class="stat-label">P2 High</div><div class="stat-val amber" id="s-p2">—</div></div>
    <div class="stat"><div class="stat-label">Today</div><div class="stat-val green" id="s-today">—</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="search" placeholder="Search by ID, name or description..." oninput="render()">
    </div>
    <select id="filter-prio" onchange="render()">
      <option value="">All priorities</option>
      <option>P1</option><option>P2</option><option>P3</option><option>P4</option>
    </select>
    <select id="filter-type" onchange="render()">
      <option value="">All types</option>
      <option>Security</option><option>Network</option><option>Application</option><option>Database</option><option>Other</option>
    </select>
    <button class="btn-new" onclick="openNew()"><i class="ti ti-plus"></i> New Incident</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:95px">ID</th>
          <th style="width:65px">Priority</th>
          <th style="width:110px">Type</th>
          <th>Name</th>
          <th style="width:110px">Author</th>
          <th style="width:135px">Time</th>
        </tr>
      </thead>
      <tbody id="tbl-body"><tr class="empty-row"><td colspan="6"><div class="spinner"></div></td></tr></tbody>
    </table>
  </div>
</div>

<!-- NEW INCIDENT MODAL -->
<div class="overlay" id="new-modal">
  <div class="modal">
    <div class="modal-title"><i class="ti ti-plus"></i> New Incident</div>
    <div class="form-grid">
      <div class="form-row"><label>Priority</label><select id="f-prio"><option>P1</option><option>P2</option><option selected>P3</option><option>P4</option></select></div>
      <div class="form-row"><label>Type</label><select id="f-type"><option>Security</option><option>Network</option><option>Application</option><option>Database</option><option>Other</option></select></div>
    </div>
    <div class="form-row"><label>Incident Name</label><input type="text" id="f-name" placeholder="Brief description..."></div>
    <div class="form-row"><label>Description</label><textarea id="f-text" placeholder="Detailed description, reproduction steps, impact..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeNew()">Cancel</button>
      <button class="btn-submit" onclick="submitNew()">Create</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-title"><i class="ti ti-alert-circle"></i> <span id="d-title"></span></div>
    <div class="detail-grid">
      <div class="detail-field"><div class="dl">ID</div><div class="dv" id="d-id"></div></div>
      <div class="detail-field"><div class="dl">Timestamp</div><div class="dv" id="d-ts"></div></div>
      <div class="detail-field"><div class="dl">Priority</div><div class="dv" id="d-prio"></div></div>
      <div class="detail-field"><div class="dl">Type</div><div class="dv" id="d-type"></div></div>
      <div class="detail-field"><div class="dl">Author</div><div class="dv" id="d-author"></div></div>
    </div>
    <div class="detail-field">
      <div class="dl" style="margin-bottom:5px">Description</div>
      <div class="detail-text" id="d-text"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-del" id="d-del-btn">Delete</button>
      <button class="btn-cancel" onclick="closeDetail()">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toast-msg"></span></div>

<script>
// ── CONFIG — baked in, no setup needed ──────────────────────────────────────
const MASTER_KEY = '$2a$10$6sG0q9/gdJSPUgRi4ws7oOq2kbXwJ9TdFkSMITBqlg1VFLI.YpdMe';
const BIN_NAME   = 'incident-tracker';
let   BIN_ID     = localStorage.getItem('it_bin_id') || '';

const ADJECTIVES = ['Swift','Silent','Sharp','Steady','Smooth','Clever','Bold','Bright','Dark','Light','Calm','Fierce'];
const NOUNS      = ['Wolf','Eagle','Deer','Bear','Falcon','Lynx','Beaver','Owl','Maple','Hawk','Bison','Fox'];

let incidents   = [];
let currentUser = '';
let saving      = false;

// ── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  currentUser = getUser();
  document.getElementById('user-badge').textContent = currentUser;
  await initBin();
  setInterval(loadData, 20000);
});

// ── USER ─────────────────────────────────────────────────────────────────────
function getUser() {
  let u = localStorage.getItem('it_user');
  if (!u) {
    u = rnd(ADJECTIVES) + rnd(NOUNS) + Math.floor(10 + Math.random() * 89);
    localStorage.setItem('it_user', u);
  }
  return u;
}
function rnd(a) { return a[Math.floor(Math.random() * a.length)]; }

// ── JSONBIN API ───────────────────────────────────────────────────────────────
const HEADERS = {
  'Content-Type': 'application/json',
  'X-Master-Key': MASTER_KEY,
  'X-Access-Key': MASTER_KEY,
  'X-Bin-Versioning': 'false'
};

async function initBin() {
  if (BIN_ID) { await loadData(); return; }
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': MASTER_KEY,
        'X-Bin-Name': BIN_NAME,
        'X-Bin-Private': 'false',
        'X-Bin-Versioning': 'false'
      },
      body: JSON.stringify([])
    });
    if (!r.ok) {
      const err = await r.json().catch(()=>({}));
      showToast('Bin error ' + r.status + ': ' + (err.message || 'check API key'), true);
      return;
    }
    const data = await r.json();
    BIN_ID = data.metadata.id;
    localStorage.setItem('it_bin_id', BIN_ID);
    // Show the bin ID prominently so it can be shared/hardcoded
    showBinIdBanner(BIN_ID);
    await loadData();
  } catch(e) { showToast('Network error: ' + e.message, true); }
}

function showBinIdBanner(id) {
  const b = document.createElement('div');
  b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#1a3a1a;border-bottom:1px solid #4ade80;padding:10px 16px;font-size:12px;font-family:monospace;color:#4ade80;z-index:999;display:flex;align-items:center;gap:12px';
  b.innerHTML = '✅ Storage bin created! <strong>Bin ID: ' + id + '</strong> — copy this and send it to whoever manages the app so it can be hardcoded. <button onclick="navigator.clipboard.writeText(\''+id+'\');this.textContent=\'Copied!\'" style="padding:3px 10px;background:#4ade80;color:#000;border:none;border-radius:4px;cursor:pointer;font-size:11px">Copy ID</button> <button onclick="this.parentElement.remove()" style="margin-left:auto;background:transparent;border:none;color:#4ade80;cursor:pointer;font-size:16px">×</button>';
  document.body.prepend(b);
}

async function loadData() {
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', { headers: HEADERS });
    const data = await r.json();
    incidents = Array.isArray(data.record) ? data.record : [];
    render();
  } catch(e) { showToast('Error loading data', true); }
}

async function saveData() {
  if (saving) return;
  saving = true;
  try {
    await fetch('https://api.jsonbin.io/v3/b/' + BIN_ID, {
      method: 'PUT',
      headers: HEADERS,
      body: JSON.stringify(incidents)
    });
  } catch(e) { showToast('Error saving data', true); }
  saving = false;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const fp = document.getElementById('filter-prio').value;
  const ft = document.getElementById('filter-type').value;

  const filtered = incidents.filter(i => {
    if (fp && i.priority !== fp) return false;
    if (ft && i.type !== ft) return false;
    if (search && !(i.id.toLowerCase().includes(search) || i.name.toLowerCase().includes(search) || (i.text||'').toLowerCase().includes(search))) return false;
    return true;
  }).sort((a, b) => b.timestamp - a.timestamp);

  const today = incidents.filter(i => isToday(i.timestamp)).length;
  document.getElementById('s-total').textContent = incidents.length;
  document.getElementById('s-p1').textContent    = incidents.filter(i => i.priority === 'P1').length;
  document.getElementById('s-p2').textContent    = incidents.filter(i => i.priority === 'P2').length;
  document.getElementById('s-today').textContent = today;

  const tbody = document.getElementById('tbl-body');
  if (!filtered.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No incidents found</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(i => `
    <tr class="clickable" onclick="openDetail('${i.id}')">
      <td class="id-cell">${i.id}</td>
      <td>${prioBadge(i.priority)}</td>
      <td><span class="type-badge">${i.type}</span></td>
      <td class="name-cell">${esc(i.name)}</td>
      <td class="author-cell">${esc(i.author||'—')}</td>
      <td class="ts-cell">${fmtTs(i.timestamp)}</td>
    </tr>`).join('');
}

// ── NEW INCIDENT ──────────────────────────────────────────────────────────────
function openNew() {
  document.getElementById('f-name').value = '';
  document.getElementById('f-text').value = '';
  document.getElementById('new-modal').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 100);
}
function closeNew() { document.getElementById('new-modal').classList.remove('open'); }

async function submitNew() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const inc = {
    id:        genId(),
    priority:  document.getElementById('f-prio').value,
    type:      document.getElementById('f-type').value,
    name,
    text:      document.getElementById('f-text').value.trim(),
    author:    currentUser,
    timestamp: Date.now()
  };
  incidents.push(inc);
  await saveData();
  closeNew();
  render();
  showToast('Incident ' + inc.id + ' created');
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function openDetail(id) {
  const i = incidents.find(x => x.id === id);
  if (!i) return;
  document.getElementById('d-title').textContent  = i.name;
  document.getElementById('d-id').textContent     = i.id;
  document.getElementById('d-ts').textContent     = fmtTs(i.timestamp);
  document.getElementById('d-prio').innerHTML     = prioBadge(i.priority);
  document.getElementById('d-type').innerHTML     = `<span class="type-badge">${i.type}</span>`;
  document.getElementById('d-author').textContent = i.author || '—';
  document.getElementById('d-text').textContent   = i.text || '(no description)';
  document.getElementById('d-del-btn').onclick    = () => deleteIncident(id);
  document.getElementById('detail-modal').classList.add('open');
}
function closeDetail() { document.getElementById('detail-modal').classList.remove('open'); }

async function deleteIncident(id) {
  if (!confirm('Are you sure you want to delete incident ' + id + '?')) return;
  incidents = incidents.filter(i => i.id !== id);
  await saveData();
  closeDetail();
  render();
  showToast('Incident ' + id + ' deleted');
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function genId() {
  const nums = incidents.map(i => parseInt(i.id.replace('INC-',''))).filter(n => !isNaN(n));
  return 'INC-' + (nums.length ? Math.max(...nums) + 1 : 1001);
}
function isToday(ts) {
  const d = new Date(ts), n = new Date();
  return d.toDateString() === n.toDateString();
}
function fmtTs(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB') + ' ' + d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
}
function prioBadge(p) { return `<span class="badge ${p.toLowerCase()}">${p}</span>`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let toastTimer;
function showToast(msg, error=false) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  t.querySelector('i').className = error ? 'ti ti-x' : 'ti ti-check';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('new-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeNew(); });
document.getElementById('detail-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeDetail(); });
document.addEventListener('keydown', e => { if(e.key==='Escape'){closeNew();closeDetail();} });
</script>
</body>
</html>
